services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

  api:
    build: ./backend
    expose:
      - "8000"
    volumes:
      - fatapp_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/fatapp.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  fatapp_data:
