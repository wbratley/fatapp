events {
    worker_connections 1024;
}

http {
    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # fatapp — served at https://<your-local-ip>/
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        location / {
            proxy_pass http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # --- Second service (hostname-based routing) ---
    # To serve another HTTPS service on the same port 443:
    #
    # 1. Stop that service from binding port 443 directly.
    # 2. Make sure it's reachable from this container (e.g. host.docker.internal,
    #    or add it to the same Docker network).
    # 3. Uncomment and fill in the block below, then add the hostname to your
    #    cert SAN (re-run generate-certs.sh with EXTRA_SANS set) and to
    #    /etc/hosts on each client: <server-ip>  otherthing.local
    #
    # server {
    #     listen 443 ssl;
    #     server_name otherthing.local;
    #
    #     ssl_certificate     /etc/nginx/certs/cert.pem;
    #     ssl_certificate_key /etc/nginx/certs/key.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_prefer_server_ciphers off;
    #
    #     location / {
    #         proxy_pass http://host.docker.internal:<port>;
    #         proxy_http_version 1.1;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #     }
    # }
}
